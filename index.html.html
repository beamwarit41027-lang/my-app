  .map__shade{ position:absolute; inset:0; z-index:2; pointer-events:none;
    background:linear-gradient(180deg, rgba(6,12,18,0.78) 0%, rgba(6,12,18,0) 26%, rgba(6,12,18,0) 60%, rgba(8,15,22,0.35) 100%); }

  .markers{ position:absolute; inset:0; z-index:5; pointer-events:none; }
  .markers > *{ pointer-events:auto; }
  .pin{ position:absolute; transform:translate(-50%,-50%); background:none; border:0; padding:0; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; }
  .pin__dot{ width:15px; height:15px; border-radius:50%; background:var(--red); border:2.5px solid #fff; box-shadow:0 0 0 3px rgba(255,122,102,0.3),0 2px 5px rgba(0,0,0,0.5); transition:transform .15s; }
  .pin__tag{ font-size:0.58rem; font-weight:700; letter-spacing:0.03em; color:#fff; background:rgba(7,14,18,0.8); padding:1px 5px; border-radius:5px; border:1px solid rgba(255,255,255,0.16); }
  .pin:hover .pin__dot{ transform:scale(1.15); }
  .pin.is-on .pin__dot{ background:#ffce7a; transform:scale(1.3); box-shadow:0 0 0 4px rgba(255,206,122,0.32),0 2px 7px rgba(0,0,0,0.5); }
  .pin.is-on .pin__tag{ background:#ffce7a; color:#3a2a08; border-color:transparent; }
  .apin{ position:absolute; transform:translate(-50%,-100%); display:none; flex-direction:column; align-items:center; z-index:6; }
  .apin__tag{ font-size:0.6rem; font-weight:700; color:#06212f; background:#cfeefc; padding:3px 8px; border-radius:7px; box-shadow:0 3px 8px rgba(0,0,0,0.4); white-space:nowrap; max-width:160px; overflow:hidden; text-overflow:ellipsis; }
  .apin__pin{ width:13px; height:13px; border-radius:50% 50% 50% 0; background:#cfeefc; border:2px solid #fff; transform:rotate(45deg); margin-top:3px; box-shadow:0 2px 5px rgba(0,0,0,0.5); }

  .topbar{ position:absolute; top:0; left:0; right:0; z-index:7; padding:max(1.4rem,env(safe-area-inset-top)) 1.05rem 0; }
  .brand{ font-weight:800; font-size:1.05rem; letter-spacing:0.04em; line-height:1; }
  .brand b{ color:var(--blue); }
  .loc{ font-size:0.78rem; color:#c7d2db; margin-top:5px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .flood-badge{ font-size:0.6rem; font-weight:700; color:#ffc6bb; background:rgba(70,20,16,0.6); border:1px solid rgba(240,110,90,0.55); padding:2px 8px; border-radius:999px; display:inline-flex; align-items:center; gap:5px; }
  .flood-badge i{ width:6px; height:6px; border-radius:50%; background:var(--red); display:inline-block; animation:pulse2 1.6s infinite; }
  @keyframes pulse2{ 0%{box-shadow:0 0 0 0 rgba(255,122,102,0.55);} 70%{box-shadow:0 0 0 5px rgba(255,122,102,0);} 100%{box-shadow:0 0 0 0 rgba(255,122,102,0);} }
  .stations{ display:flex; gap:5px; margin-top:11px; padding:4px; width:max-content; max-width:100%; overflow-x:auto;
    background:rgba(7,13,18,0.45); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.12); border-radius:12px; }
  .stations::-webkit-scrollbar{ height:0; }
  .st{ border:0; background:transparent; color:#cdd8e0; font-family:inherit; font-weight:600; font-size:0.76rem; padding:5px 11px; border-radius:9px; cursor:pointer; transition:background .18s,color .18s; white-space:nowrap; }
  .st.is-on{ background:var(--blue); color:#06212f; }

  /* bottom sheet */
  .sheet{ position:absolute; left:0; right:0; bottom:0; z-index:8; background:var(--panel); border-radius:24px 24px 0 0; border-top:1px solid rgba(255,255,255,0.08); box-shadow:0 -22px 55px rgba(0,0,0,0.55); }
  .sheet__head{ padding:7px 1.1rem 10px; cursor:pointer; user-select:none; }
  .grip{ width:38px; height:4px; border-radius:99px; background:rgba(255,255,255,0.28); margin:0 auto 8px; }
  .head-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .h-label{ font-size:0.56rem; letter-spacing:0.11em; text-transform:uppercase; color:var(--dim); }
  .h-level{ font-size:1.6rem; font-weight:700; line-height:1.05; letter-spacing:-0.02em; margin-top:1px; }
  .h-level small{ font-size:0.72rem; color:var(--dim); font-weight:600; margin-left:1px; }
  .h-level .trend{ font-size:0.8rem; margin-left:7px; }
  .trend{ font-weight:700; display:inline-flex; align-items:center; gap:4px; }
  .head-right{ display:flex; align-items:center; gap:10px; }
  .chev{ width:22px; height:22px; color:var(--dim); transition:transform .38s ease; flex:none; }
  .sheet.open .chev{ transform:rotate(180deg); }
  .chip{ display:inline-block; font-size:0.64rem; font-weight:700; padding:3px 9px; border-radius:999px; white-space:nowrap; }
  .chip--watch{ color:#ffce7a; background:rgba(240,182,87,0.14); border:1px solid rgba(240,182,87,0.42); }
  .chip--flood{ color:#ff9b8a; background:rgba(240,90,70,0.16); border:1px solid rgba(240,90,70,0.46); }
  .chip--normal{ color:#86e0b0; background:rgba(80,200,140,0.15); border:1px solid rgba(80,200,140,0.4); }

  .sheet__body{ max-height:0; overflow:hidden; transition:max-height .4s ease; padding:0 1.15rem; }
  .sheet.open .sheet__body{ max-height:60vh; overflow-y:auto; padding-bottom:1.1rem; }

  .search{ display:flex; gap:7px; margin:2px 0 12px; }
  .search input{ flex:1; min-width:0; padding:0.6rem 0.8rem; border-radius:11px; border:1px solid var(--line); background:#0c1116; color:#fff; font-family:inherit; font-size:0.85rem; }
  .search input::placeholder{ color:var(--dim2); }
  .search button{ border:0; background:var(--blue); color:#06212f; font-family:inherit; font-weight:700; font-size:0.8rem; padding:0 0.95rem; border-radius:11px; cursor:pointer; }
  .addr-result{ display:none; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:0.6rem 0.75rem; font-size:0.78rem; line-height:1.4; margin-bottom:12px; }
  .addr-result b{ color:#fff; }

  .spark{ width:100%; height:56px; display:block; }
  .foot{ font-size:0.62rem; color:var(--dim2); margin-top:7px; letter-spacing:0.02em; }

  .fc3{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:13px; }
  .fc3 button{ background:var(--card); border:1px solid var(--line); border-radius:13px; padding:0.6rem 0.4rem; text-align:center; cursor:pointer; font-family:inherit; color:var(--ink); transition:border-color .18s, background .18s; }
  .fc3 button.is-on{ border-color:var(--blue); background:rgba(92,192,240,0.10); }
  .fc3 .k{ font-size:0.56rem; letter-spacing:0.05em; text-transform:uppercase; color:var(--dim); }
  .fc3 .v{ font-size:1.08rem; font-weight:700; margin-top:3px; }
  .fc3 .d{ font-size:0.6rem; font-weight:600; margin-top:1px; }

  .stats{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:9px; }
  .stat{ background:var(--card); border:1px solid var(--line); border-radius:13px; padding:0.7rem 0.8rem; }
  .stat .k{ font-size:0.58rem; letter-spacing:0.04em; text-transform:uppercase; color:var(--dim); }
  .stat .v{ font-size:1.22rem; font-weight:700; margin-top:4px; line-height:1; }
  .stat .v small{ font-size:0.66rem; color:var(--dim); font-weight:600; }
  .cloud-bar{ height:5px; border-radius:99px; background:rgba(255,255,255,0.12); overflow:hidden; margin-top:7px; }
  .cloud-bar>i{ display:block; height:100%; background:linear-gradient(90deg,#9fb6c8,#e3edf3); }
  .stat .sub{ font-size:0.66rem; margin-top:7px; }

  .alert{ margin-top:9px; border-radius:13px; padding:0.78rem 0.9rem; display:flex; gap:10px; align-items:flex-start; }
  .alert--watch{ background:rgba(240,160,80,0.10); border:1px solid rgba(240,160,80,0.4); }
  .alert--flood{ background:rgba(230,80,60,0.12); border:1px solid rgba(230,90,70,0.5); }
  .alert--normal{ background:rgba(80,200,140,0.08); border:1px solid rgba(80,200,140,0.35); }
  .alert svg{ width:20px; height:20px; flex:none; margin-top:1px; }
  .alert h4{ margin:0 0 2px; font-size:0.86rem; font-weight:700; }
  .alert p{ margin:0; font-size:0.75rem; line-height:1.4; color:#c2ccd4; }
  .source{ font-size:0.62rem; color:var(--dim2); text-align:center; margin-top:13px; line-height:1.5; }
  .source b{ color:var(--dim); font-weight:600; }
</style>
</head>
<body>
  <div class="stage">
    <div class="app" id="app">
      <div class="map"></div>
      <div class="flood" id="flood"></div>
      <div class="map__shade"></div>
      <div class="markers" id="markers">
        <div class="apin" id="addrpin"><span class="apin__tag"></span><span class="apin__pin"></span></div>
      </div>

      <div class="topbar">
        <div class="brand">SPECTRA<b>FLOW</b></div>
        <div class="loc">Ping River · Chiang Mai <span class="flood-badge"><i></i> Flood today · 21 Jun 2026</span></div>
        <div class="stations" id="stations"></div>
      </div>

      <div class="sheet" id="sheet">
        <div class="sheet__head" id="toggle" role="button" aria-expanded="false" tabindex="0">
          <div class="grip"></div>
          <div class="head-row">
            <div class="head-left">
              <div class="h-label" id="h-label">Current level · <span id="st-name">Nawarat Bridge</span></div>
              <div class="h-level"><span id="lvl">5.30</span><small>m</small><span class="trend" id="trend"></span></div>
            </div>
            <div class="head-right">
              <span class="chip" id="status"></span>
              <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15l6-6 6 6"/></svg>
            </div>
          </div>
        </div>

        <div class="sheet__body" id="body">
          <div class="search">
            <input id="addr" list="places" placeholder="Enter your address or place…" />
            <button id="go">Check</button>
          </div>
          <datalist id="places"></datalist>
          <div class="addr-result" id="addr-result"></div>

          <svg class="spark" id="spark" viewBox="0 0 320 56" preserveAspectRatio="none"></svg>
          <div class="foot" id="foot"></div>

          <div class="fc3" id="fc3"></div>

          <div class="stats">
            <div class="stat">
              <div class="k">☁ Cloud cover</div>
              <div class="v"><span id="cloud">—</span><small>%</small></div>
              <div class="cloud-bar"><i id="cloud-bar" style="width:0%"></i></div>
            </div>
            <div class="stat">
              <div class="k">⚠ Flood threshold</div>
              <div class="v"><span id="thr">—</span> <small>m</small></div>
              <div class="sub" id="margin">—</div>
            </div>
          </div>

          <div class="alert" id="alert"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 17-point forecasts, every 3 h (0…48 h). Today is a flood day — all gauges over bank.
    var STATIONS = {
      P1:  { name:'Nawarat Bridge', x:27.7, y:16.2, thr:3.70, cloud:95, fc:[4.92,5.00,5.08,5.15,5.22,5.30,5.36,5.41,5.45,5.48,5.50,5.49,5.47,5.44,5.40,5.36,5.30] },
      P67: { name:'City reach',     x:52.0, y:55.0, thr:3.90, cloud:92, fc:[4.55,4.62,4.70,4.78,4.85,4.92,4.98,5.02,5.05,5.06,5.04,5.00,4.95,4.90,4.84,4.78,4.70] },
      P75: { name:'Downstream',     x:45.0, y:82.0, thr:4.10, cloud:90, fc:[4.40,4.46,4.52,4.58,4.63,4.68,4.72,4.75,4.78,4.80,4.79,4.77,4.74,4.70,4.65,4.60,4.54] }
    };
    var PLACES = [
      {n:'Nawarat Bridge', x:50,y:52},{n:'Tha Phae Gate', x:42,y:50},{n:'Nimmanhaemin', x:33,y:45},
      {n:'Warorot Market', x:52,y:50},{n:'Chiang Mai University', x:28,y:53},{n:'Old City', x:40,y:48},
      {n:'Riverside (Charoenrat)', x:53,y:55},{n:'Chiang Mai Airport', x:32,y:70},{n:'Santitham', x:38,y:42},
      {n:'Night Bazaar', x:48,y:56},{n:'San Sai', x:55,y:30},{n:'Hang Dong', x:34,y:84}
    ];
    var STEP_H=3, HORIZONS={now:0,h24:8,h48:16};
    var currentSt='P1', horizon='now';
    var IMG_W=768, IMG_H=1344, addrPlaced=false, addrFx=0, addrFy=0;
    function layoutMarkers(){
      var app=document.getElementById('app'), cw=app.clientWidth, ch=app.clientHeight; if(!cw||!ch) return;
      var scale=Math.max(cw/IMG_W, ch/IMG_H), dw=IMG_W*scale, dh=IMG_H*scale, ox=(cw-dw)/2, oy=(ch-dh)/2;
      function place(el,fx,fy){ el.style.left=(ox+fx*dw)+'px'; el.style.top=(oy+fy*dh)+'px'; }
      document.querySelectorAll('#markers .pin').forEach(function(p){ place(p, parseFloat(p.dataset.fx), parseFloat(p.dataset.fy)); });
      if(addrPlaced) place(document.getElementById('addrpin'), addrFx, addrFy);
    }

    function hash01(s){ var h=2166136261; for(var i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619);} h^=h<<13; h^=h>>>17; h^=h<<5; return ((h>>>0)%100000)/100000; }
    function statusOf(l,thr){ if(l>=thr) return {key:'flood',label:'Flooding · above bank',cls:'flood',col:'#ff9b8a'};
      if(l>=thr-0.4) return {key:'watch',label:'Flood watch',cls:'watch',col:'#ffce7a'};
      return {key:'normal',label:'Normal',cls:'normal',col:'#86e0b0'}; }
    function trendOf(fc){ var d=fc[fc.length-1]-fc[0]; if(d>0.12) return {w:'rising',a:'▲',c:'#f0b657'}; if(d<-0.12) return {w:'falling',a:'▼',c:'#6fe0a8'}; return {w:'steady',a:'▬',c:'#9fb6c8'}; }
    function fmt(n){ return n.toFixed(2); }
    function sparkSVG(fc,thr,col,hi){
      var W=320,H=56,pad=5,n=fc.length;
      var lo=Math.min.apply(null,fc.concat([thr])),hhi=Math.max.apply(null,fc.concat([thr])),rng=(hhi-lo)||1;
      function X(i){return pad+i*(W-2*pad)/(n-1);} function Y(v){return H-pad-(v-lo)/rng*(H-2*pad);}
      var line='M'+X(0)+' '+Y(fc[0]); for(var i=1;i<n;i++) line+=' L'+X(i)+' '+Y(fc[i]);
      var area=line+' L'+X(n-1)+' '+H+' L'+X(0)+' '+H+' Z'; var ty=Y(thr);
      return '<defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="'+col+'" stop-opacity="0.42"/><stop offset="1" stop-color="'+col+'" stop-opacity="0"/></linearGradient></defs>'+
        '<line x1="0" y1="'+ty+'" x2="'+W+'" y2="'+ty+'" stroke="#ff9b8a" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>'+
        '<path d="'+area+'" fill="url(#sg)"/>'+
        '<path d="'+line+'" fill="none" stroke="'+col+'" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>'+
        '<line x1="'+X(hi)+'" y1="0" x2="'+X(hi)+'" y2="'+H+'" stroke="#fff" stroke-width="1" opacity="0.25"/>'+
        '<circle cx="'+X(hi)+'" cy="'+Y(fc[hi])+'" r="4" fill="#fff"/>';
    }

    function render(){
      var s=STATIONS[currentSt], fc=s.fc, hi=HORIZONS[horizon], lvl=fc[hi];
      var stt=statusOf(lvl,s.thr), tr=trendOf(fc);
      document.getElementById('st-name').textContent=currentSt+' · '+s.name;
      document.getElementById('h-label').innerHTML=(horizon==='now'?'Current level':'Forecast · in '+(hi*STEP_H)+' h')+' · <span id="st-name">'+currentSt+' · '+s.name+'</span>';
      document.getElementById('lvl').textContent=fmt(lvl);
      var tEl=document.getElementById('trend'); tEl.innerHTML=tr.a+' '+tr.w; tEl.style.color=tr.c;
      var stEl=document.getElementById('status'); stEl.textContent=stt.label; stEl.className='chip chip--'+stt.cls;
      document.getElementById('spark').innerHTML=sparkSVG(fc,s.thr,stt.col,hi);
      document.getElementById('foot').textContent='48-hour forecast · updated 1 h ago';

      var U='<small style="font-size:.6rem;color:var(--dim);font-weight:600;margin-left:1px">m</small>';
      function dlt(v){ var d=v-fc[0],sg=d>=0?'+':'−',c=d>=0?'#f0b657':'#6fe0a8'; return '<span class="d" style="color:'+c+'">'+sg+Math.abs(d).toFixed(2)+' m</span>'; }
      document.getElementById('fc3').innerHTML=
        '<button data-h="now" class="'+(horizon==='now'?'is-on':'')+'"><div class="k">Now</div><div class="v">'+fmt(fc[0])+U+'</div><div class="d" style="color:var(--dim)">current</div></button>'+
        '<button data-h="h24" class="'+(horizon==='h24'?'is-on':'')+'"><div class="k">+24 h</div><div class="v">'+fmt(fc[8])+U+'</div>'+dlt(fc[8])+'</button>'+
        '<button data-h="h48" class="'+(horizon==='h48'?'is-on':'')+'"><div class="k">+48 h</div><div class="v">'+fmt(fc[16])+U+'</div>'+dlt(fc[16])+'</button>';
      document.querySelectorAll('#fc3 button').forEach(function(b){ b.addEventListener('click', function(){ horizon=b.getAttribute('data-h'); render(); }); });

      document.getElementById('cloud').textContent=s.cloud;
      document.getElementById('cloud-bar').style.width=s.cloud+'%';
      document.getElementById('thr').textContent=fmt(s.thr);
      var marg=s.thr-lvl;
      document.getElementById('margin').innerHTML=marg>0?'<span style="color:#86e0b0">'+marg.toFixed(2)+' m below</span>':'<span style="color:#ff9b8a">'+Math.abs(marg).toFixed(2)+' m over bank</span>';

      var al=document.getElementById('alert');
      var warn='<svg viewBox="0 0 24 24" fill="none" stroke="#ff9b8a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>';
      var ok='<svg viewBox="0 0 24 24" fill="none" stroke="#6fe0a8" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
      if(stt.key==='flood'){ al.className='alert alert--flood'; al.innerHTML=warn+'<div><h4>Flooding'+(horizon!=='now'?' forecast in '+(hi*STEP_H)+' h':' now')+'</h4><p>Water is '+Math.abs(marg).toFixed(2)+' m over the bank at '+currentSt+'. Move belongings up and avoid riverside areas.</p></div>'; }
      else if(stt.key==='watch'){ al.className='alert alert--watch'; al.innerHTML=warn.replace(/#ff9b8a/g,'#f0b657')+'<div><h4>Flood watch</h4><p>Approaching the '+fmt(s.thr)+' m threshold. Stay alert.</p></div>'; }
      else { al.className='alert alert--normal'; al.innerHTML=ok+'<div><h4>Below flood level</h4><p>Forecast stays under the '+fmt(s.thr)+' m threshold.</p></div>'; }

      // flood overlay strength grows with the predicted level
      var op=Math.max(0.72, Math.min(1, 0.80 + (lvl - s.thr)*0.4));
      document.getElementById('flood').style.opacity=op;

      // marker active state
      document.querySelectorAll('#markers .pin').forEach(function(p){ p.classList.toggle('is-on', p.getAttribute('data-st')===currentSt); });
      // pills
      document.querySelectorAll('#stations .st').forEach(function(b){ b.classList.toggle('is-on', b.getAttribute('data-st')===currentSt); });
    }

    function selectStation(k){ currentSt=k; render(); }

    // build pills + map markers
    var stationsEl=document.getElementById('stations'), markersEl=document.getElementById('markers');
    Object.keys(STATIONS).forEach(function(k){
      var s=STATIONS[k];
      var pill=document.createElement('button'); pill.className='st'; pill.setAttribute('data-st',k); pill.textContent=k;
      pill.addEventListener('click', function(e){ e.stopPropagation(); selectStation(k); }); stationsEl.appendChild(pill);
      var pin=document.createElement('button'); pin.className='pin'; pin.dataset.fx=s.x/100; pin.dataset.fy=s.y/100; pin.setAttribute('data-st',k);
      pin.innerHTML='<span class="pin__dot"></span><span class="pin__tag">'+k+'</span>';
      pin.addEventListener('click', function(e){ e.stopPropagation(); selectStation(k); }); markersEl.appendChild(pin);
    });
    // datalist
    var dl=document.getElementById('places'); PLACES.forEach(function(p){ var o=document.createElement('option'); o.value=p.n; dl.appendChild(o); });
    layoutMarkers();
    window.addEventListener('resize', layoutMarkers);
    if(window.ResizeObserver){ new ResizeObserver(layoutMarkers).observe(document.getElementById('app')); }
    requestAnimationFrame(layoutMarkers);

    // address lookup -> pin + nearest gauge
    var addrPin=document.getElementById('addrpin');
    function locate(){
      var q=(document.getElementById('addr').value||'').trim(); if(!q) return;
      var ql=q.toLowerCase(), place=null;
      for(var i=0;i<PLACES.length;i++){ if(PLACES[i].n.toLowerCase().indexOf(ql)>=0){ place=PLACES[i]; break; } }
      if(!place){ place={ n:q, x:28+Math.round(hash01(q)*36), y:34+Math.round(hash01(q+'_y')*46) }; }
      addrFx=place.x/100; addrFy=place.y/100; addrPlaced=true;
      addrPin.querySelector('.apin__tag').textContent=place.n; addrPin.style.display='flex'; layoutMarkers();
      var best=null,bd=1e9; Object.keys(STATIONS).forEach(function(k){ var s=STATIONS[k]; var d=(s.x-place.x)*(s.x-place.x)+(s.y-place.y)*(s.y-place.y); if(d<bd){bd=d;best=k;} });
      selectStation(best);
      var s=STATIONS[best], lvl=s.fc[HORIZONS[horizon]], stt=statusOf(lvl,s.thr);
      var res=document.getElementById('addr-result'); res.style.display='block';
      res.innerHTML='📍 <b>'+place.n+'</b> — nearest gauge '+best+' · ~'+fmt(lvl)+' m · <span style="color:'+stt.col+';font-weight:700">'+stt.label+'</span>';
    }
    document.getElementById('go').addEventListener('click', locate);
    document.getElementById('addr').addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); locate(); } });

    // sheet open/close
    var sheet=document.getElementById('sheet'), toggle=document.getElementById('toggle');
    function toggleSheet(){ var open=sheet.classList.toggle('open'); toggle.setAttribute('aria-expanded',String(open)); }
    toggle.addEventListener('click', toggleSheet);
    toggle.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); toggleSheet(); } });

    render();
  </script>
</body>
</html>
